<style>
/* ═══════════════════════════════════════════════
   TaskBoard — CSS 設計系統
   風格：可愛極簡、暖黃治癒系 (Pazua 風格)
   ═══════════════════════════════════════════════ */

/* ── Google Fonts ─────────────────────────────── */
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap');

/* ── CSS 變數（設計 Token） ───────────────────── */
:root {
  --bg:          #FAF6EE; /* 溫慢的燕麥色 (Pazua 主色調) */
  --surface:     #FFFFFF;
  --surface-2:   #F5F0E6; /* 稍微深一點的燕麥色，做區隔 */
  --border:      #EAE4D8; /* 溫和的灰褐邊框 */
  --border-md:   #DDD5C7;
  --text:        #3D3A35; /* 溫潤的暖深灰，不採用生硬的純黑 */
  --text-2:      #7C756B;
  --text-3:      #AAA294;
  --primary:     #FF8E72; /* 溫馨的蜜桃粉橘 */
  --primary-dk:  #E57356;
  --primary-lt:  #FFF0EC;
  --success:     #7FD8BE; /* 粉嫩的薄荷綠 */
  --success-lt:  #E8F8F4;
  --warning:     #FED049; /* 治癒的鵝黃色 */
  --warning-lt:  #FFF9E6;
  --danger:      #FF6F61;
  --danger-lt:   #FFEBE9;
  --purple:      #82C0CC; /* 柔和的水藍色 */
  --purple-lt:   #EDF7F9;
  --orange:      #FFB26B;
  --orange-lt:   #FFF6EC;

  --radius:      20px; /* 圓滾滾的邊角 */
  --radius-sm:   12px;
  --radius-lg:   28px;
  --shadow:      0 8px 24px rgba(61, 58, 53, 0.04);
  --shadow-md:   0 12px 32px rgba(61, 58, 53, 0.08);
  --shadow-lg:   0 20px 48px rgba(61, 58, 53, 0.12);
  --transition:  0.3s cubic-bezier(.4,0,.2,1);

  --sidebar-w:   72px; /* 預設折疊寬度 */
}

/* ── Reset & Base ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Quicksand', 'Fredoka', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ── 載入畫面 ─────────────────────────────────── */
#loading-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 9999;
  transition: opacity .4s;
}
#loading-screen .logo-text {
  font-family: 'Fredoka', sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 10px;
}
#loading-screen .spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 登入畫面 ───────────────────────────────── */
#login-screen {
  position: fixed; inset: 0;
  background: linear-gradient(135deg, #FFF0EC 0%, #FAF6EE 50%, #E8F8F4 100%);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9998;
}
.login-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  max-width: 420px;
  width: 90%;
  border: 3px solid var(--border);
}
.login-card .brand {
  font-family: 'Fredoka', sans-serif;
  font-size: 38px; font-weight: 700; color: var(--primary);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.login-card .tagline {
  color: var(--text-2); margin-bottom: 32px; font-size: 15px;
}

/* ── App 版面（登入後） ───────────────────────── */
#app {
  display: none;
  height: 100vh;
  overflow: hidden;
}

/* ── 側邊欄（折疊型，懸浮展開） ──────────────── */
.sidebar {
  position: fixed; top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--surface);
  border-right: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: width var(--transition), box-shadow var(--transition);
  overflow: hidden;
}
/* 懸浮展開側邊欄 */
.sidebar:hover {
  width: 240px;
  box-shadow: var(--shadow-lg);
}

.sidebar-header {
  padding: 24px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-bottom: 2px solid var(--border);
  height: 80px;
}
.sidebar-brand {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: 12px;
  white-space: nowrap;
}
.sidebar-brand .text {
  font-family: 'Fredoka', sans-serif;
  font-size: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity var(--transition), visibility var(--transition);
}
.sidebar:hover .sidebar-brand .text {
  opacity: 1;
  visibility: visible;
}
.sidebar-tagline { display: none; }

.sidebar-user {
  padding: 16px 0;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  border-bottom: 2px solid var(--border);
  transition: padding var(--transition);
}
.sidebar:hover .sidebar-user {
  padding: 16px 20px;
  justify-content: flex-start;
}
.avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--primary-lt);
  border: 2px solid var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: var(--primary);
  flex-shrink: 0;
}
.user-info {
  display: none;
  opacity: 0;
  transition: opacity var(--transition);
}
.sidebar:hover .user-info {
  display: block;
  opacity: 1;
}
.user-info .name { font-size: 13.5px; font-weight: 700; color: var(--text); }
.user-info .role {
  font-size: 11px; color: var(--primary);
  background: var(--primary-lt);
  padding: 2px 8px; border-radius: 99px; display: inline-block;
  font-weight: 600; margin-top: 2px;
}

.sidebar-nav { flex: 1; overflow-y: auto; padding: 16px 12px; }
.nav-section { margin-bottom: 16px; }
.nav-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-3);
  padding: 0 16px; margin-bottom: 8px;
  display: none;
}
.sidebar:hover .nav-section-title {
  display: block;
}

.nav-item {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 0;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  color: var(--text-2);
  cursor: pointer;
  transition: all var(--transition);
  border: none; background: none;
  margin: 8px auto;
  flex-shrink: 0;
}
.sidebar:hover .nav-item {
  justify-content: flex-start;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  width: 100%;
  height: auto;
  margin: 6px 0;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--primary-lt); color: var(--primary); font-weight: 700; }
.nav-item .icon { font-size: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.nav-item .label {
  display: none;
  opacity: 0;
  font-size: 14px;
  font-weight: 600;
  transition: opacity var(--transition);
}
.sidebar:hover .nav-item .label {
  display: inline-block;
  opacity: 1;
}

.sidebar-footer {
  display: none;
}
.sidebar:hover .sidebar-footer {
  display: block;
}

/* ── 主內容區 ─────────────────────────────────── */
.main {
  margin-left: var(--sidebar-w);
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  flex: 1;
  width: 100%;
}
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250, 246, 238, 0.9);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--border);
  padding: 16px 32px;
  display: flex; align-items: center; gap: 12px;
  height: 80px;
}
.topbar-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

.content { padding: 32px; flex: 1; }

/* ── 篩選標籤 ─────────────────────────────────── */
.filter-tabs {
  display: flex; gap: 8px; flex-wrap: wrap;
  margin-bottom: 24px;
}
.filter-tab {
  padding: 8px 18px; border-radius: 99px;
  font-size: 13px; font-weight: 600;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--text-2);
  cursor: pointer;
  transition: all var(--transition);
}
.filter-tab:hover { border-color: var(--primary); color: var(--primary); }
.filter-tab.active {
  background: var(--primary); border-color: var(--primary);
  color: #fff;
  box-shadow: 0 4px 12px rgba(255, 142, 114, 0.2);
}

/* ── 狀態 Section ─────────────────────────────── */
.status-section { margin-bottom: 32px; }
.status-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 16px;
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.status-label { font-size: 14px; font-weight: 700; color: var(--text); }
.status-count {
  font-size: 12px; color: var(--text-2);
  background: var(--surface-2);
  padding: 2px 10px; border-radius: 99px;
  font-weight: 600;
}

/* ── 懸浮新增任務按鈕 (FAB) ────────────────────── */
.fab {
  position: fixed;
  bottom: 32px;
  right: 32px;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: var(--primary);
  color: white;
  border: none;
  font-size: 26px;
  box-shadow: 0 10px 28px rgba(255, 142, 114, 0.4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, background-color 0.3s;
}
.fab:hover {
  transform: scale(1.1) rotate(90deg);
  background: var(--primary-dk);
  box-shadow: 0 14px 36px rgba(255, 142, 114, 0.6);
}

/* ── 任務便條紙卡片 ─────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}
.task-card {
  background: #FFFBE8; /* 預設暖黃色便條紙 */
  border: 2px solid #F3ECD0;
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15), box-shadow 0.3s, border-color 0.3s;
  position: relative;
  box-shadow: 0 6px 16px rgba(61, 58, 53, 0.04);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
/* 紙膠帶 Washi Tape 裝飾 */
.task-card::after {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%) rotate(-1deg);
  width: 64px;
  height: 18px;
  background: rgba(254, 208, 73, 0.45); /* 黃色膠帶 */
  backdrop-filter: blur(1px);
  border-radius: 1px;
  box-shadow: 0 2px 4px rgba(61, 58, 53, 0.04);
  transition: background-color 0.3s;
}

.task-card:hover {
  transform: translateY(-6px) rotate(1deg);
  box-shadow: 0 14px 32px rgba(61, 58, 53, 0.08);
  border-color: #E2D4B6;
}

/* 依據優先度變更便條紙與紙膠帶顏色 */
.task-card[data-priority="緊急"] {
  background: #FFF0EB; /* 粉紅色便條紙 */
  border-color: #F8D8CF;
}
.task-card[data-priority="緊急"]::after {
  background: rgba(255, 111, 97, 0.4);
}

.task-card[data-priority="高"] {
  background: #FFF5EA; /* 淺橘色便條紙 */
  border-color: #F5E3CE;
}
.task-card[data-priority="高"]::after {
  background: rgba(255, 178, 107, 0.4);
}

.task-card[data-priority="一般"] {
  background: #FFFBE8; /* 鵝黃色便條紙 */
  border-color: #F3ECD0;
}
.task-card[data-priority="一般"]::after {
  background: rgba(254, 208, 73, 0.45);
}

.task-card[data-priority="低"] {
  background: #F4F7F6; /* 水藍色便條紙 */
  border-color: #DFE8E6;
}
.task-card[data-priority="低"]::after {
  background: rgba(130, 192, 204, 0.45);
}

/* 已完成狀態稍微變淡綠色 */
.task-card.completed {
  opacity: 0.8;
  background: #EBF8F4;
  border-color: #CBECE2;
}
.task-card.completed::after {
  background: rgba(127, 216, 190, 0.45);
}

.task-card::before {
  display: none !important; /* 隱藏原本的垂直邊條 */
}

.task-card .card-title {
  font-size: 15px; font-weight: 700;
  line-height: 1.4;
  color: var(--text);
  font-family: 'Quicksand', sans-serif;
}
.task-card .card-desc {
  font-size: 13px; color: var(--text-2);
  display: -webkit-box; -webkit-line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
  line-height: 1.6;
}
.card-meta {
  display: flex; align-items: center; gap: 8px;
  flex-wrap: wrap;
  margin-top: auto;
}
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11.5px; font-weight: 600;
  padding: 4px 10px; border-radius: 99px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-2);
}
.chip-due.overdue { background: var(--danger-lt); color: var(--danger); border-color: transparent; }
.chip-due.today { background: var(--warning-lt); color: #B45309; border-color: transparent; }

.priority-badge {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px;
}
.priority-緊急 { background: var(--danger-lt); color: var(--danger); }
.priority-高   { background: var(--orange-lt); color: #B45309; }
.priority-一般 { background: var(--warning-lt); color: #B48F09; }
.priority-低   { background: var(--purple-lt); color: #3A8891; }

/* ── 任務詳細面板 ─────────────────────────────── */
.detail-overlay {
  position: fixed; inset: 0;
  background: rgba(61, 58, 53, 0.4);
  z-index: 200;
  display: none;
  animation: fadeIn .2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.task-card .card-actions {
  position: absolute;
  top: 14px;
  right: 14px;
  display: flex;
  gap: 4px;
  z-index: 10;
  opacity: 0;
  transition: opacity var(--transition);
}
.task-card:hover .card-actions {
  opacity: 1;
}
@media (max-width: 768px) {
  .task-card .card-actions {
    opacity: 0.8;
  }
}

.detail-panel {
  position: fixed; top: 0; right: 0;
  width: min(600px, 100vw);
  height: 100vh;
  background: var(--surface);
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  z-index: 201;
  transform: translateX(100%);
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  border-left: 3px solid var(--border);
}
.detail-panel.open { transform: translateX(0); }

.panel-header {
  padding: 24px 32px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
}
.panel-header .panel-title {
  flex: 1; font-size: 18px; font-weight: 700; line-height: 1.3;
}
.btn-close {
  border: none; background: none; cursor: pointer;
  font-size: 20px; color: var(--text-3); padding: 4px;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.btn-close:hover { background: var(--bg); color: var(--text); }

.panel-body { flex: 1; overflow-y: auto; padding: 32px; }

.info-block { margin-bottom: 24px; }
.info-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-3); margin-bottom: 8px;
}
.info-value { font-size: 14.5px; color: var(--text); line-height: 1.7; }
.info-value.pre { white-space: pre-wrap; }
.info-value.empty { color: var(--text-3); font-style: italic; }

.divider { border: none; border-top: 2px solid var(--border); margin: 24px 0; }

.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 99px;
  font-size: 12px; font-weight: 700;
}



.panel-actions {
  padding: 20px 32px;
  border-top: 2px solid var(--border);
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: flex-end;
}

/* ── 按鈕系統 ─────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 20px; border-radius: var(--radius-sm);
  font-size: 13.5px; font-weight: 700; font-family: inherit;
  cursor: pointer; border: none; transition: all var(--transition);
  white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #fff; box-shadow: 0 4px 12px rgba(255, 142, 114, 0.2); }
.btn-primary:hover { background: var(--primary-dk); }
.btn-success { background: var(--success); color: #fff; box-shadow: 0 4px 12px rgba(127, 216, 190, 0.2); }
.btn-success:hover { background: #5ECAB0; }
.btn-danger  { background: var(--danger); color: #fff; }
.btn-danger:hover  { background: #E25C4F; }
.btn-outline {
  background: transparent;
  border: 2px solid var(--border-md);
  color: var(--text-2);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-lt); }
.btn-ghost { background: transparent; color: var(--text-2); border: none; }
.btn-ghost:hover { background: var(--surface-2); color: var(--text); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-sm); }
.btn:disabled { opacity: .5; cursor: not-allowed; box-shadow: none !important; }

/* ── Modal（新增/編輯任務） ───────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(61, 58, 53, 0.4);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn .2s;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  width: 100%; max-width: 560px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  border: 3px solid var(--border);
  animation: slideUp .25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}
.modal-header {
  padding: 24px 32px;
  border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.modal-title { font-size: 18px; font-weight: 700; flex: 1; }
.modal-body { padding: 24px 32px; }
.modal-footer {
  padding: 20px 32px;
  border-top: 2px solid var(--border);
  display: flex; justify-content: flex-end; gap: 12px;
}

.form-group { margin-bottom: 20px; }
.form-label {
  display: block; font-size: 13px; font-weight: 700;
  color: var(--text-2); margin-bottom: 8px;
}
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-control {
  width: 100%; padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13.5px; font-family: inherit;
  color: var(--text); background: var(--surface);
  transition: border-color var(--transition);
}
.form-control:focus { outline: none; border-color: var(--primary); }
textarea.form-control { resize: vertical; min-height: 90px; line-height: 1.6; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* 通知多選 */
.notify-checks { display: flex; flex-wrap: wrap; gap: 8px; }
.notify-check {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 14px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  transition: all var(--transition);
}
.notify-check input { accent-color: var(--primary); }
.notify-check:has(input:checked) {
  border-color: var(--primary);
  background: var(--primary-lt);
  color: var(--primary);
}

/* ── Toast 通知 ───────────────────────────────── */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 9999;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  display: flex; align-items: center; gap: 10px;
  background: var(--text);
  color: #fff;
  padding: 14px 20px; border-radius: var(--radius-sm);
  box-shadow: var(--shadow-md);
  font-size: 13.5px; font-weight: 700;
  min-width: 260px; max-width: 380px;
  animation: toastIn .3s cubic-bezier(.4,0,.2,1);
  border: 2px solid rgba(255,255,255,0.1);
}
@keyframes toastIn {
  from { transform: translateX(100%); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.toast.success { background: var(--success); color: var(--text); border-color: var(--border); }
.toast.error   { background: var(--danger); }
.toast.warning { background: #B45309; }

/* ── 空白狀態 ─────────────────────────────────── */
.empty-state { text-align: center; padding: 64px 20px; color: var(--text-3); }
.empty-state .empty-icon { font-size: 54px; margin-bottom: 16px; }
.empty-state .empty-title { font-size: 17px; font-weight: 700; color: var(--text-2); margin-bottom: 8px; }
.empty-state .empty-desc { font-size: 13.5px; }

/* ── 漢堡按鈕（手機）──────────────────────────── */
.hamburger {
  display: none;
  border: none; background: none; cursor: pointer;
  font-size: 24px; color: var(--text-2); padding: 4px;
}

/* ── 統計卡片（Admin 首頁摘要）──────────────────── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-card .stat-num {
  font-size: 32px; font-weight: 700; color: var(--text);
  line-height: 1;
  font-family: 'Fredoka', sans-serif;
}
.stat-card .stat-label {
  font-size: 13px; color: var(--text-2); margin-top: 6px;
  font-weight: 600;
}

/* ── RWD ──────────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }

  .sidebar {
    transform: translateX(-260px);
    width: 260px !important;
  }
  .sidebar:hover {
    width: 260px !important;
    box-shadow: var(--shadow-lg);
  }
  /* 手機版展開時強制顯示標籤與文字 */
  .sidebar.mobile-open {
    transform: translateX(0);
    box-shadow: var(--shadow-lg);
  }
  .sidebar.mobile-open .sidebar-brand .text,
  .sidebar.mobile-open .user-info,
  .sidebar.mobile-open .nav-item .label,
  .sidebar.mobile-open .nav-section-title,
  .sidebar.mobile-open .sidebar-footer {
    display: inline-block !important;
    opacity: 1 !important;
    visibility: visible !important;
  }
  .sidebar.mobile-open .sidebar-user {
    padding: 16px 20px !important;
    justify-content: flex-start !important;
  }
  .sidebar.mobile-open .nav-item {
    justify-content: flex-start !important;
    padding: 12px 16px !important;
    border-radius: var(--radius-sm) !important;
    width: 100% !important;
    height: auto !important;
    margin: 6px 0 !important;
  }

  .main { margin-left: 0; }
  .hamburger { display: block; }
  .topbar { padding: 16px 24px; }
  #topbar-create-btn { display: none !important; }
  .content { padding: 20px; }

  .cards-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }

  .detail-panel {
    width: 100vw;
    border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    height: 85vh;
    top: auto; bottom: 0; right: 0;
    transform: translateY(100%);
    border-left: none;
    border-top: 3px solid var(--border);
  }
  .detail-panel.open { transform: translateY(0); }
  
  .fab {
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    font-size: 22px;
  }
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .modal { border-radius: var(--radius-lg) var(--radius-lg) 0 0; margin-top: auto; border-bottom: none; }
}

/* ── 自訂滾動條 ────────────────────────────────── */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ── 動畫工具類別 ──────────────────────────────── */
.fade-in { animation: fadeIn .25s ease; }
.slide-in { animation: slideIn .25s cubic-bezier(.4,0,.2,1); }
@keyframes slideIn {
  from { transform: translateY(8px); opacity: 0; }
  to   { transform: translateY(0); opacity: 1; }
}

/* ── 使用者管理頁面 ────────────────────────────── */

.user-table tr:hover td { background: var(--bg); }

}

const App = {

// ═══════════════════════════════════════════════
// API 呼叫（支援 google.script.run 與外部跨網域 fetch 呼叫）
// ═══════════════════════════════════════════════
function api(action, params) {
  params = params || {};
  if (action !== 'login') {
    params.authEmail = localStorage.getItem('tb_user_email') || '';
    params.authPin   = localStorage.getItem('tb_user_pin') || '';
  }

  // 1. 若在 Google App Script 環境中，直接使用 google.script.run
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    return new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.error) {
            if (result.error === 'NOT_LOGGED_IN') {
              showLoginScreen();
              reject(new Error(result.message || '請登入'));
            } else {
              reject(new Error(result.error));
            }
          } else {
            resolve(result);
          }
        })
        .withFailureHandler(function(err) {
          reject(new Error(err.message || String(err)));
        })
        .clientApi(action, params);
    });
  }

  // 2. 若在外部環境（如 GitHub Pages），使用 HTTP POST 請求
  const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzGm8rqoKFk3JXN1YbmD1WAh3meyta79_9jjh91WJb7l-CgRxat1w28tn-JIt9y4Z_2Cg/exec';
  const gasUrl = localStorage.getItem('tb_gas_url') || DEFAULT_GAS_URL;
  if (!gasUrl) {
    showLoginScreen();
    return Promise.reject(new Error('請設定 Google Web App 網址'));
  }

  return new Promise(function(resolve, reject) {
    fetch(gasUrl, {
      method: 'POST',
      mode: 'cors',
      headers: {
        'Content-Type': 'text/plain' // 避免 preflight OPTIONS 跨域預檢失敗
      },
      body: JSON.stringify({ action: action, params: params })
    })
    .then(res => {
      if (!res.ok) throw new Error('伺服器連線失敗');
      return res.json();
    })
    .then(result => {
      if (result && result.error) {
        if (result.error === 'NOT_LOGGED_IN') {
          showLoginScreen();
          reject(new Error(result.message || '請登入'));
        } else {
          reject(new Error(result.error));
        }
      } else {
        resolve(result);
      }
    })
    .catch(err => {
      reject(new Error('伺服器請求失敗，請確認 GAS 網址與部署設定正確。'));
    });
  });
}


async function init() {
  showLoading(true);
  try {
    const email = localStorage.getItem('tb_user_email');
    const pin   = localStorage.getItem('tb_user_pin');
    
    // 如果是外部託管且沒有 GAS 網址（也無預設網址），強制登入
    const isExternal = !(typeof google !== 'undefined' && google.script && google.script.run);
    const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzGm8rqoKFk3JXN1YbmD1WAh3meyta79_9jjh91WJb7l-CgRxat1w28tn-JIt9y4Z_2Cg/exec';
    if (isExternal && !localStorage.getItem('tb_gas_url') && !DEFAULT_GAS_URL) {
      showLoginScreen();
      return;
    }
    
    if (!email || !pin) {
      showLoginScreen();
      return;
    }

    // 1. 一次性載入全部資料 (秒開)
    const initRes = await api('initData');
    if (!initRes || !initRes.user) {
      showLoginScreen();
      return;
    }

    App.user = initRes.user;
    App.tasks = initRes.tasks || [];
    App.users = initRes.users || [];

    // 身分驗證通過，顯示主介面框架
    showApp();
    renderSidebar();
    updateNavBadges();
    renderDashboard();
  } catch (e) {
    console.error('初始化失敗：', e);
    showLoginScreen();
  }
}

// ═══════════════════════════════════════════════
// 顯示與登入控制
// ═══════════════════════════════════════════════
function showLoading(on) {
  document.getElementById('loading-screen').style.display = on ? 'flex' : 'none';
}
function showLoginScreen() {
  showLoading(false);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
function showApp() {
  showLoading(false);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

async function handleLoginSubmit() {
  const emailInput = document.getElementById('login-email');
  const pinInput   = document.getElementById('login-pin');
  const email      = emailInput.value.trim();
  const pin        = pinInput.value.trim();

  // 外部託管：直接將硬編碼的 GAS 網址寫入 localStorage，不需使用者輸入
  const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbzGm8rqoKFk3JXN1YbmD1WAh3meyta79_9jjh91WJb7l-CgRxat1w28tn-JIt9y4Z_2Cg/exec';
  const isExternal = !(typeof google !== 'undefined' && google.script && google.script.run);
  if (isExternal) {
    localStorage.setItem('tb_gas_url', DEFAULT_GAS_URL);
  }

  if (!email) { showToast('請輸入 Email', 'warning'); return; }
  if (!pin)   { showToast('請輸入 PIN 碼', 'warning'); return; }

  showLoading(true);

  try {
    const res = await api('login', { email, pin });
    if (res.error) {
      showToast(res.error, 'error');
      showLoginScreen();
    } else if (res.success) {
      localStorage.setItem('tb_user_email', email);
      localStorage.setItem('tb_user_pin', pin);
      showToast('登入驗證成功！', 'success');
      await init();
    }
  } catch (e) {
    showToast('登入失敗：' + e.message, 'error');
    showLoginScreen();
  }
}

function logout() {
  localStorage.removeItem('tb_user_email');
  localStorage.removeItem('tb_user_pin');
  App.user = null;
  App.tasks = [];
  App.users = [];
  showLoginScreen();
}

function updateNavBadges() {
  // 等待理解
  const waitCount = App.tasks.filter(t => t.Status === '等待理解').length;
  // 待驗收
  const reviewCount = App.tasks.filter(t => t.Status === '待驗收').length;
  // 逾期
  const overdueCount = countOverdue();

  document.querySelectorAll('.nav-badge-wait').forEach(el => {

function countOverdue() {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  return App.tasks.filter(t => {
    if (['完成', '封存'].includes(t.Status)) return false;
    if (!t.DueDate) return false;
    return new Date(t.DueDate) < now;
  }).length;
}

    el.classList.toggle('active', el.dataset.view === view);
  });

      await loadUsers();
      renderUsers();

}

// Dashboard 渲染

function renderDashboard() {
  const isAdmin = App.user.Role === 'Admin';
  const tasks = isAdmin ? App.tasks : App.tasks.filter(t => t.AssigneeEmail === App.user.Email);

  // 依據 showCompleted 狀態決定是否過濾掉已完成、已封存任務
  const filteredTasks = App.showCompleted 
    ? tasks 
    : tasks.filter(t => !['完成','封存'].includes(t.Status));

  let html = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap; gap:10px;">
      <h2 style="display:flex; align-items:center; gap:8px; font-size:20px; font-weight:600; color:var(--text); margin:0;">${icon('board')} 任務便條紙</h2>
      <label style="font-size:13.5px; color:var(--text-2); display:flex; align-items:center; gap:6px; cursor:pointer; user-select:none;">
        <input type="checkbox" onchange="App.showCompleted = this.checked; renderDashboard()" ${App.showCompleted ? 'checked' : ''} style="accent-color:var(--primary); width:15px; height:15px; cursor:pointer;">
        顯示已完成 / 封存任務
      </label>
    </div>
  `;

    html += emptyState(icon('star'), '目前沒有任務', '目前尚無符合條件的便條紙。');
  } else {
    // 渲染便條紙網格
    html += `
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        ${filteredTasks.map(renderStickyNote).join('')}
      </div>
    `;
  }

  document.getElementById('main-content').innerHTML = html;
}

// 渲染極簡便條紙 (Pazua 風格：紙膠帶與卡片顏色)
function renderStickyNote(task) {
  const due      = task.DueDate ? new Date(task.DueDate) : null;
  const today    = new Date(); today.setHours(0,0,0,0);
  const isOverdue = due && due < today && !['完成','封存'].includes(task.Status);
  const dueText  = due ? formatDatetime(due) : '無截止日';
  const dueClass = isOverdue ? 'overdue' : '';

  // 是否已完成
  const isCompleted = ['完成', '封存'].includes(task.Status);
  const cardClass = isCompleted ? 'task-card completed' : 'task-card';

  // 提醒通知標籤 (僅在有設定時顯示)
  let alarmChip = '';
  const taskNotifyDays = task.Notes ? String(task.Notes).split(',').map(s => s.trim()).filter(Boolean) : [];
  if (taskNotifyDays.length > 0) {
    const daysMap = { '3': '3天前', '1': '1天前', '0': '當天', '-1': '2hr前' };
    const alarms = taskNotifyDays
      .map(d => {
        if (d.startsWith('custom:')) {
          const t = new Date(d.replace('custom:', ''));
          return isNaN(t.getTime()) ? null : `自訂:${formatDatetime(t)}`;
        }
        return daysMap[d];
      })
      .filter(Boolean)
      .join(', ');
    if (alarms) {
      alarmChip = `<div style="margin-top: 2px;"><span class="chip" style="border-color: var(--primary); color: var(--primary); cursor: pointer; display: inline-flex; align-items:center; gap:4px;" onclick="event.stopPropagation(); openQuickNotifyModal('${task.TaskID}')" title="點擊調整提醒">${icon('bell')} ${alarms}</span></div>`;
    }
  }

  const isAdmin = App.user.Role === 'Admin';
  const assigneeLine = isAdmin ? `<div style="display:flex; align-items:center; gap:4px;"><span style="opacity:0.5;">${icon('user', 'width:13px;height:13px;')}</span> 指派：<strong>${getAssigneeName(task.AssigneeEmail)}</strong></div>` : '';

  // 只有未完成的任務才顯示完成按鈕 (已完成任務不顯示任何按鈕/虛線框以減少高度與噪音)
  const actionButton = !isCompleted 
    ? `<div style="margin-top: 8px; z-index: 10;">
         <button onclick="markCompleted(event, '${task.TaskID}')" class="btn btn-success" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;">
           ${icon('check')} 標示為完成
         </button>
       </div>`
    : '';

  return `
    <div class="${cardClass}" data-priority="${task.Priority || '一般'}" onclick="openTask('${task.TaskID}')">
      
      <!-- 右上角編輯與刪除動作區 (Hover 顯示) -->
      <div class="card-actions">
        <button onclick="event.stopPropagation(); openQuickNotifyModal('${task.TaskID}')" style="background:none; border:none; cursor:pointer; padding:5px; display:flex; align-items:center; color:var(--text-2);" title="提醒設定">${icon('bell')}</button>
        ${!isCompleted ? `<button onclick="event.stopPropagation(); openEditTask('${task.TaskID}')" style="background:none; border:none; cursor:pointer; padding:5px; display:flex; align-items:center; color:var(--text-2);" title="編輯">${icon('edit')}</button>` : ''}
        <button onclick="event.stopPropagation(); deleteTaskDirectly('${task.TaskID}')" style="background:none; border:none; cursor:pointer; padding:5px; display:flex; align-items:center; color:var(--text-3);" title="刪除">${icon('trash')}</button>
      </div>

      <!-- 標題 -->
      <div class="card-title" style="padding-right: 76px;">
        ${esc(task.Title)}
      </div>
      
      <!-- 內容 -->
      <div class="card-desc">
        ${esc(task.Description || '無內容')}
      </div>
      
      <!-- 底部資訊 -->
      <div style="font-size: 12.5px; color: var(--text-2); margin-top: auto; display: flex; flex-direction: column; gap: 6px;">
        ${assigneeLine}
        <div class="chip-due ${dueClass}" style="display: inline-flex; align-items: center; gap: 4px;">${icon('calendar')} 截止：${dueText}</div>
        ${alarmChip}
      </div>
      
      ${actionButton}
    </div>
  `;
}

// 直接刪除便條紙
async function deleteTaskDirectly(taskId) {
  if (!confirm('確定要刪除這張便條紙（任務）嗎？此動作無法復原。')) return;
  try {
    await api('deleteTask', { taskId });
    showToast('便條紙已撕除（任務刪除）', 'success');
    await loadTasks();
    if (App.currentView === 'dashboard') renderDashboard();
    else renderTaskList(App.currentView.replace('tasks-', ''));
  } catch (err) {
    showToast('刪除失敗：' + err.message, 'error');
  }
}

// 點擊完成按鈕
async function markCompleted(e, taskId) {
  e.stopPropagation();
  if(!confirm('確定要將此任務標示為完成嗎？\n完成後將會從便條紙牆上移除。')) return;

  try {
    const btn = e.currentTarget;
    btn.disabled = true;
    btn.innerHTML = '處理中...';
    
    await api('markTaskCompleted', { taskId });
    showToast('任務已完成！', 'success');
    
    // 重新載入並渲染
    await loadTasks();
    renderDashboard();
  } catch (err) {
    showToast('操作失敗：' + err.message, 'error');
  }
}

function filterLabel(f) {
  return { all:'全部', today:'今天', week:'本週', overdue:'已逾期', done:'已完成' }[f] || f;
}

function setFilter(f) {
  App.filter = f;
  renderDashboard();
}

function isDueToday(task) {
  if (!task.DueDate) return false;
  const due = new Date(task.DueDate); due.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  return due.getTime() === today.getTime();
}

// ═══════════════════════════════════════════════
// 任務列表渲染（my / all / done）
// ═══════════════════════════════════════════════
function renderTaskList(mode) {
  let tasks = App.tasks;
  if (mode === 'mine') tasks = tasks.filter(t => t.AssigneeEmail === App.user.Email);
  if (mode === 'done') tasks = tasks.filter(t => ['完成','封存'].includes(t.Status));
  else if (mode !== 'all') tasks = tasks.filter(t => !['完成','封存'].includes(t.Status));

  // 套用搜尋
  if (App.searchQuery) {
    const q = App.searchQuery.toLowerCase();
    tasks = tasks.filter(t =>
      (t.Title || '').toLowerCase().includes(q) ||
      (t.AssigneeEmail || '').toLowerCase().includes(q) ||
      (t.Description || '').toLowerCase().includes(q)
    );
  }

  let html = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h2 style="font-size:20px; font-weight:600; color:var(--text-1); margin:0;">
        ${mode === 'done' ? `<span style="display:inline-flex;align-items:center;gap:6px;">${icon('checkBox')} 已完成的便條</span>` : `<span style="display:inline-flex;align-items:center;gap:6px;">${icon('board')} 任務便條紙</span>`}
      </h2>
    </div>
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
      ${tasks.length ? tasks.map(renderStickyNote).join('') : emptyState('&#9747;','沒有任務','目前沒有符合條件的任務。')}
    </div>
  `;
  document.getElementById('main-content').innerHTML = html;
}

function setFilterList(f, mode) {
  App.filter = f;
  renderTaskList(mode);
}

// 任務卡片 HTML
// ═══════════════════════════════════════════════
function renderTaskCard(task) {
  const isAdmin  = App.user.Role === 'Admin';
  const due      = task.DueDate ? new Date(task.DueDate) : null;
  const today    = new Date(); today.setHours(0,0,0,0);
  const isOverdue = due && due < today && !['完成','封存'].includes(task.Status);
  const isTodayDue = due && due.toDateString() === today.toDateString();

  const dueClass = isOverdue ? 'overdue' : isTodayDue ? 'today' : '';
  const dueText  = due ? formatDate(due) : '無截止日';

  const assigneeName = isAdmin ? `<span class="chip chip-assignee" style="display:inline-flex;align-items:center;gap:3px;">${icon('user', 'width:12px;height:12px;')} ${getAssigneeName(task.AssigneeEmail)}</span>` : '';
  const isCompleted = ['完成','封存'].includes(task.Status);
  const cardClass = isCompleted ? 'task-card completed' : 'task-card';

  return `
    <div class="${cardClass}" data-priority="${task.Priority || '一般'}" onclick="openTask('${task.TaskID}')">
      <div class="card-title">${esc(task.Title)}</div>
      <div class="card-desc">${esc(task.Description || '')}</div>
      <div class="card-meta">
        ${statusBadgeSmall(task.Status)}
        <span class="chip chip-due ${dueClass}" style="display:inline-flex;align-items:center;gap:3px;">${icon('calendar')} ${dueText}</span>
        ${assigneeName}
        <span class="priority-badge priority-${task.Priority || '一般'}">${task.Priority || '一般'}</span>
      </div>
    </div>
  `;
}

function getAssigneeName(email) {
  const u = App.users.find(u => u.Email === email);
  return u ? u.Name : email ? email.split('@')[0] : '—';
}

};

function statusBadge(status) {

// ═══════════════════════════════════════════════
async function openTask(taskId) {
  const panel   = document.getElementById('detail-panel');
  const overlay = document.getElementById('detail-overlay');

  // 先顯示讀取中
  panel.querySelector('.panel-body').innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-3)">載入中…</div>`;
  overlay.style.display = 'block';
  panel.classList.add('open');

  try {
    const task = await api('getTaskDetail', { taskId });
    App.openTask = task;

    // 載入 Users（Admin 需要姓名對應）
    if (App.user.Role === 'Admin' && App.users.length === 0) await loadUsers();

    renderTaskDetail(task);
  } catch (e) {
    showToast('載入任務失敗：' + e.message, 'error');
    closePanel();
  }
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-overlay').style.display = 'none';
  App.openTask = null;
}

        <div class="info-label">建立時間</div>

      </div>

    <!-- 主管交辦內容 -->
    <div class="info-block">
      <div class="info-label">主管交辦內容</div>
      <div class="info-value pre">${esc(task.Description || '')}</div>
    </div>


  `;

  document.getElementById('panel-body').innerHTML = body;
  document.getElementById('panel-actions').innerHTML = actions;
}




function buildActionButtons(task, isAdmin, isAssignee) {
  const btns = [];

  if (isAdmin) {
    if (task.Status !== '完成' && task.Status !== '封存') {
      btns.push(`<button class="btn btn-outline btn-sm" style="display:inline-flex;align-items:center;gap:6px;" onclick="openEditTask('${task.TaskID}')">${icon('edit')} 編輯任務</button>`);
    }
    if (task.Status === '待驗收') {
      btns.push(`<button class="btn btn-success" style="display:inline-flex;align-items:center;gap:6px;" onclick="acceptTask('${task.TaskID}')">${icon('check')} 驗收完成</button>`);
    }
    if (task.Status === '完成') {
      btns.push(`<button class="btn btn-outline btn-sm" style="display:inline-flex;align-items:center;gap:6px;" onclick="archiveTask('${task.TaskID}')">${icon('archive')} 封存</button>`);
    }
    btns.push(`<button class="btn btn-outline btn-sm" style="display:inline-flex;align-items:center;gap:6px;color:var(--danger);border-color:var(--danger);" onclick="deleteTask('${task.TaskID}')">${icon('trash')} 刪除</button>`);
  }

  if (isAssignee && task.Status === '進行中') {
    btns.push(`<button class="btn btn-primary" style="display:inline-flex;align-items:center;gap:6px;" onclick="markComplete('${task.TaskID}')">${icon('check')} 標示完成</button>`);
  }

  return btns.join('');
}

function formatForDatetimeLocal(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return '';
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const hours = String(d.getHours()).padStart(2, '0');
  const minutes = String(d.getMinutes()).padStart(2, '0');
  return `${year}-${month}-${day}T${hours}:${minutes}`;
}

  ).join('');

  const taskNotifyDays = task && task.Notes ? String(task.Notes).split(',').map(s => s.trim()).filter(Boolean) : [];
  const customItem = taskNotifyDays.find(d => String(d).startsWith('custom:'));
  const hasCustom = !!customItem;
  const customTimeVal = hasCustom ? customItem.replace('custom:', '') : '';

  const content = `
    <div class="form-group">
      <label class="form-label">任務名稱 <span class="required">*</span></label>
      <input id="f-title" class="form-control" value="${esc(task?.Title||'')}" placeholder="輸入任務名稱">
    </div>
    <div class="form-group">
      <label class="form-label">交辦內容 <span class="required">*</span></label>
      <textarea id="f-desc" class="form-control" rows="4" placeholder="詳細說明工作內容、要求和目標…">${esc(task?.Description||'')}</textarea>
    </div>
    ${isAdmin ? `
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">指派人 <span class="required">*</span></label>
        <select id="f-assignee" class="form-control">
          <option value="">請選擇指派人…</option>
          ${userOptions}
        </select>
      </div>
    </div>
    ` : `<input type="hidden" id="f-assignee" value="${task?.AssigneeEmail || App.user.Email}">`}
    <div class="form-group">
      <label class="form-label">截止時間 <span class="required">*</span></label>
      <input id="f-due" type="datetime-local" class="form-control" value="${formatForDatetimeLocal(task?.DueDate)}">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">優先度 (決定便條紙顏色)</label>
        <select id="f-priority" class="form-control">
          <option value="一般" ${task?.Priority==='一般'?'selected':''}>一般 (黃色)</option>
          <option value="低" ${task?.Priority==='低'?'selected':''}>低 (水藍)</option>
          <option value="高" ${task?.Priority==='高'?'selected':''}>高 (淺橘)</option>
          <option value="緊急" ${task?.Priority==='緊急'?'selected':''}>緊急 (粉紅)</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">LINE / Email 提醒設定</label>
      <div class="notify-checks">
        <label class="notify-check">
          <input type="checkbox" id="n-3" value="3" ${taskNotifyDays.includes('3')?'checked':''}>
          3 天前
        </label>
        <label class="notify-check">
          <input type="checkbox" id="n-1" value="1" ${taskNotifyDays.includes('1')?'checked':''}>
          1 天前
        </label>
        <label class="notify-check">
          <input type="checkbox" id="n-0" value="0" ${taskNotifyDays.includes('0')?'checked':''}>
          當天 09:00
        </label>
        <label class="notify-check">
          <input type="checkbox" id="n-sub2" value="-1" ${taskNotifyDays.includes('-1')?'checked':''}>
          截止前 2 小時
        </label>
      </div>
      <div style="margin-top: 12px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
        <label class="notify-check" style="margin: 0; display: inline-flex; align-items: center; cursor: pointer;">
          <input type="checkbox" id="n-custom-check" onchange="document.getElementById('n-custom-val').disabled = !this.checked" ${hasCustom?'checked':''}>

        </label>
        <input type="datetime-local" id="n-custom-val" class="form-control" style="width: auto; flex: 1; min-width: 180px;" value="${customTimeVal}" ${hasCustom?'':'disabled'}>

    </div>
  `;

  document.getElementById('modal-title').textContent = isEdit ? '編輯任務' : '新增任務';
  document.getElementById('modal-body').innerHTML = content;
  document.getElementById('modal-confirm-btn').textContent = isEdit ? '儲存變更' : '建立任務';
  document.getElementById('modal-confirm-btn').onclick = () => isEdit ? saveTask(task.TaskID) : createTask();
  document.getElementById('task-modal').classList.add('open');
}

function closeTaskModal() {
  document.getElementById('task-modal').classList.remove('open');
}

async function createTask() {
  const data = getFormData();
  if (!data) return;

  const btn = document.getElementById('modal-confirm-btn');
  btn.disabled = true; btn.textContent = '建立中…';

  try {
    await api('createTask', { data });
    showToast('任務建立成功！', 'success');
    closeTaskModal();
    await loadTasks();
    renderDashboard();
  } catch (e) {
    showToast('建立失敗：' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '建立任務';
  }
}

async function saveTask(taskId) {
  const data = getFormData();
  if (!data) return;

  const btn = document.getElementById('modal-confirm-btn');
  btn.disabled = true; btn.textContent = '儲存中…';

  try {
    await api('updateTask', { taskId, data });
    showToast('任務已更新', 'success');
    closeTaskModal();
    await loadTasks();
    await refreshTask(taskId);
    renderDashboard();
  } catch (e) {
    showToast('更新失敗：' + e.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = '儲存變更';
  }
}

function getFormData() {
  const title      = document.getElementById('f-title').value.trim();
  const desc       = document.getElementById('f-desc').value.trim();
  const assignee   = document.getElementById('f-assignee').value;
  const dueDate    = document.getElementById('f-due').value;
  const priority   = document.getElementById('f-priority').value;

  if (!title)    { showToast('請輸入任務名稱', 'warning'); return null; }
  if (!desc)     { showToast('請輸入交辦內容', 'warning'); return null; }
  if (!assignee) { showToast('請選擇指派人', 'warning'); return null; }
  if (!dueDate)  { showToast('請選擇截止時間', 'warning'); return null; }

  const notifyDays = [];
  if (document.getElementById('n-3').checked) notifyDays.push(3);
  if (document.getElementById('n-1').checked) notifyDays.push(1);
  if (document.getElementById('n-0').checked) notifyDays.push(0);
  if (document.getElementById('n-sub2').checked) notifyDays.push(-1);
  if (document.getElementById('n-custom-check').checked) {
    const customVal = document.getElementById('n-custom-val').value;
    if (customVal) notifyDays.push(`custom:${customVal}`);
  }

  return {
    title,
    description: desc,
    assigneeEmail: assignee,
    dueDate,
    priority,
    notes: notifyDays.join(','),
    notifyDays
  };
}

document.addEventListener('click', function(e) {
  const sidebar = document.querySelector('.sidebar');
  const hamburger = document.querySelector('.hamburger');
  if (sidebar && sidebar.classList.contains('mobile-open')) {
    // 若點選的區域不在側邊欄內，也不在漢堡選單按鈕內，則收合

// ═══════════════════════════════════════════════
// Toast 通知
// ═══════════════════════════════════════════════
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <span style="display:inline-flex;align-items:center;">${type==='success'?icon('check'):type==='error'?icon('trash'):type==='warning'?'<b style="font-size:15px">!</b>':'<b style="font-size:15px">i</b>'}</span>
    <span>${esc(msg)}</span>
  `;
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(100%)';
    toast.style.transition = 'all .3s';
    setTimeout(() => toast.remove(), 300);
  }, 3500);
}

// ═══════════════════════════════════════════════
// 工具函式
// ═══════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatDate(date) {
  if (!(date instanceof Date) || isNaN(date)) return '—';
  return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
}

function formatDatetime(date) {
  if (!(date instanceof Date) || isNaN(date)) return '—';
  return `${formatDate(date)} ${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
}

function emptyState(icon, title, desc) {
  return `
    <div class="empty-state">
      <div class="empty-icon">${icon}</div>
      <div class="empty-title">${title}</div>
      <div class="empty-desc">${desc}</div>
    </div>
  `;
}
